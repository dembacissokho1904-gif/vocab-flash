<!doctype html><html lang="en" class="h-full"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Vocab Flash</title><script src="https://cdn.tailwindcss.com/3.4.17"></script><script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script><script src="/_sdk/element_sdk.js"></script><link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet"><style>* { margin: 0; padding: 0; box-sizing: border-box; }html, body { height: 100%; font-family: 'DM Sans', sans-serif; }.perspective-container { perspective: 1200px; }.card-inner {position: relative;width: 100%;height: 100%;transition: transform 0.7s cubic-bezier(0.4, 0.0, 0.2, 1);transform-style: preserve-3d;}.card-inner.flipped { transform: rotateY(180deg); }.card-face {position: absolute;inset: 0;backface-visibility: hidden;-webkit-backface-visibility: hidden;border-radius: 1.25rem;display: flex;flex-direction: column;align-items: center;justify-content: center;padding: 2rem;}.card-back { transform: rotateY(180deg); }.progress-ring-bg { stroke: rgba(255,255,255,0.15); }.progress-ring-fill {transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1);transform: rotate(-90deg);transform-origin: 50% 50%;}.anim-slide-up { animation: slideUp 0.6s ease-out both; }.anim-fade { animation: fadeIn 0.5s ease-out both; }.anim-scale { animation: scaleIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) both; }@keyframes slideUp {from { opacity: 0; transform: translateY(30px); }to { opacity: 1; transform: translateY(0); }}@keyframes fadeIn {from { opacity: 0; }to { opacity: 1; }}@keyframes scaleIn {from { opacity: 0; transform: scale(0.85); }to { opacity: 1; transform: scale(1); }}@keyframes confettiBurst {0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }100% { transform: translateY(-120px) rotate(720deg) scale(0); opacity: 0; }}@keyframes shimmer {0% { background-position: -200% 0; }100% { background-position: 200% 0; }}.confetti-particle {position: absolute;width: 8px; height: 8px;border-radius: 2px;animation: confettiBurst 1.2s ease-out forwards;}.btn-action {transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);}.btn-action:hover { transform: translateY(-2px); }.btn-action:active { transform: translateY(0) scale(0.97); }.mastery-bar {transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);}.toast-msg {animation: slideUp 0.4s ease-out both;}.shimmer-text {background: linear-gradient(90deg, currentColor 40%, rgba(255,255,255,0.8) 50%, currentColor 60%);background-size: 200% 100%;-webkit-background-clip: text;-webkit-text-fill-color: transparent;background-clip: text;animation: shimmer 2s ease-in-out infinite;}</style><script src="/_sdk/data_sdk.js" type="text/javascript"></script></head><body class="h-full overflow-auto" style="background: #0f1729;"><div id="app-wrapper" class="h-full w-full"><div id="main-screen" class="h-full w-full flex flex-col items-center justify-center p-4 relative overflow-hidden"><div class="absolute inset-0 overflow-hidden pointer-events-none"><div class="absolute top-[-20%] right-[-10%] w-[500px] h-[500px] rounded-full" style="background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);"></div><div class="absolute bottom-[-15%] left-[-10%] w-[400px] h-[400px] rounded-full" style="background: radial-gradient(circle, rgba(244,114,182,0.12) 0%, transparent 70%);"></div></div><header class="relative z-10 text-center mb-8 anim-slide-up"><p class="text-sm font-medium tracking-[0.2em] uppercase mb-3" style="color: #a78bfa; font-family: 'DM Sans', sans-serif;">Vocab Flash</p><h1 class="text-4xl md:text-5xl font-extrabold leading-tight" style="color: #f1f5f9; font-family: 'Playfair Display', serif;">Spanish Greetings</h1><p class="mt-3 text-base" style="color: #94a3b8;">90 words across 10 categories</p></header><div class="relative z-10 mb-8 anim-scale" style="animation-delay: 0.15s;"><svg width="120" height="120" viewbox="0 0 120 120"><circle class="progress-ring-bg" cx="60" cy="60" r="52" fill="none" stroke-width="6" /><circle id="progress-ring" class="progress-ring-fill" cx="60" cy="60" r="52" fill="none" stroke-width="6" stroke="#a78bfa" stroke-linecap="round" stroke-dasharray="326.73" stroke-dashoffset="326.73" /></svg><div class="absolute inset-0 flex flex-col items-center justify-center"><span id="progress-count" class="text-2xl font-bold" style="color: #f1f5f9;">0/90</span><span class="text-xs" style="color: #64748b;">mastered</span></div></div><div id="card-area" class="relative z-10 w-full max-w-md anim-scale" style="animation-delay: 0.3s;"><div class="perspective-container w-full" style="height: 260px;"><div id="card-inner" class="card-inner cursor-pointer" onclick="flipCard()"><div class="card-face" style="background: linear-gradient(145deg, #1e293b 0%, #334155 100%); border: 1px solid rgba(148,163,184,0.1);"><span class="text-xs font-medium tracking-widest uppercase mb-4" style="color: #64748b;">Spanish</span><div id="card-front-content"><p id="card-front-text" class="text-3xl font-bold text-center" style="color: #f1f5f9;">¡Hola!</p><p id="card-scenario" class="text-sm mt-3 text-center" style="color: #94a3b8;"></p></div><div id="card-front-image" style="display:none; width:100%; height:100%; flex-direction:column; align-items:center; justify-content:center;"></div><p id="card-category" class="text-xs mt-3 px-2 py-1 rounded-full" style="background: rgba(167,139,250,0.1); color: #a78bfa;">Salutations</p></div><div class="card-face card-back" style="background: linear-gradient(145deg, #312e81 0%, #4c1d95 100%); border: 1px solid rgba(167,139,250,0.2);"><span id="card-lang-label" class="text-xs font-medium tracking-widest uppercase mb-4" style="color: rgba(196,181,253,0.6);">French</span><p id="card-back-text" class="text-3xl font-bold text-center" style="color: #ede9fe;">Hello!</p><p id="card-type-badge" class="text-xs mt-3 px-2 py-1 rounded-full" style="background: rgba(196,181,253,0.2); color: #c4b5fd;">Vocabulaire</p></div></div></div><p id="card-counter" class="text-center text-sm mt-4" style="color: #64748b;">Card 1 of 90</p><div class="flex gap-2 mt-3 justify-center"><button onclick="switchLanguage(0)" id="btn-french" class="btn-action text-xs px-3 py-1.5 rounded-lg font-medium" style="background: rgba(167,139,250,0.2); color: #a78bfa; border: 1px solid rgba(167,139,250,0.5);">Français</button><button onclick="switchLanguage(1)" id="btn-bambara" class="btn-action text-xs px-3 py-1.5 rounded-lg font-medium" style="background: rgba(100,116,139,0.2); color: #64748b; border: 1px solid rgba(100,116,139,0.3);">Bambara</button></div></div><div id="action-buttons" class="relative z-10 flex items-center gap-4 mt-8 anim-fade" style="animation-delay: 0.45s;"><button onclick="markCard(false)" class="btn-action flex items-center gap-2 px-5 py-3 rounded-xl font-medium text-sm" style="background: rgba(239,68,68,0.12); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2);"><i data-lucide="x-circle" style="width:18px;height:18px;"></i>Still Learning</button><button onclick="markCard(true)" class="btn-action flex items-center gap-2 px-5 py-3 rounded-xl font-medium text-sm" style="background: rgba(34,197,94,0.12); color: #86efac; border: 1px solid rgba(34,197,94,0.2);"><i data-lucide="check-circle" style="width:18px;height:18px;"></i>Got It!</button></div><div id="mastery-section" class="relative z-10 w-full max-w-md mt-10 anim-fade" style="animation-delay: 0.6s;"><div class="flex items-center justify-between mb-3"><h2 class="text-xs font-semibold tracking-widest uppercase" style="color: #64748b;">Card Progress</h2><button onclick="resetAll()" class="text-xs flex items-center gap-1 btn-action px-2 py-1 rounded-md" style="color: #64748b; background: rgba(100,116,139,0.1);"><i data-lucide="refresh-cw" style="width:12px;height:12px;"></i>Reset</button></div><div id="mastery-bars" class="space-y-2"></div></div><div id="confetti-container" class="absolute inset-0 pointer-events-none z-50"></div><div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 hidden"><div class="toast-msg px-5 py-3 rounded-xl text-sm font-medium shadow-2xl" style="background: #312e81; color: #c4b5fd; border: 1px solid rgba(167,139,250,0.3);"><span id="toast-text"></span></div></div></div><div id="complete-screen" class="h-full w-full flex-col items-center justify-center p-6 hidden" style="display: none;"><div class="text-center anim-scale"><div class="text-6xl mb-4">🎉</div><h2 class="text-3xl font-extrabold mb-2" style="color: #f1f5f9;">All Mastered!</h2><p class="mt-3 text-base mb-8" style="color: #94a3b8;">You've learned all 90 Spanish vocabulary words</p><button onclick="resetAll()" class="btn-action inline-flex items-center gap-2 px-7 py-3.5 rounded-xl font-semibold text-sm" style="background: linear-gradient(135deg, #7c3aed, #a78bfa); color: #fff;"><i data-lucide="rotate-cw" style="width:16px;height:16px;"></i>Practice Again</button></div></div></div><script src="app.js"></script></body></html>
